steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$fastapi-gcp-app/fastapi-service-dev', '.']

  # Push image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$fastapi-gcp-app/fastapi-service-dev']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - fastapi-service-dev
      - --image
      - gcr.io/$fastapi-gcp-app/fastapi-service-dev
      - --region
      - asia-south1
      - --platform
      - managed
      - --allow-unauthenticated